name: Release

on:
  push:
    tags:
      - 'v*'

jobs:
  build:
    name: Build ${{ matrix.target }}
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        include:
          - os: macos-latest
            target: aarch64-apple-darwin
            binary: hello_world

          - os: macos-latest
            target: x86_64-apple-darwin
            binary: hello_world

          - os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
            binary: hello_world

          - os: ubuntu-latest
            target: aarch64-unknown-linux-gnu
            binary: hello_world

          - os: windows-latest
            target: x86_64-pc-windows-msvc
            binary: hello_world.exe

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      # Linux ARM64 需要交叉编译工具链
      - name: Install cross-compilation tools (Linux ARM64)
        if: matrix.target == 'aarch64-unknown-linux-gnu'
        run: |
          sudo apt-get update
          sudo apt-get install -y gcc-aarch64-linux-gnu

      - name: Build
        run: cargo build --release --target ${{ matrix.target }}
        env:
          CARGO_TARGET_AARCH64_UNKNOWN_LINUX_GNU_LINKER: aarch64-linux-gnu-gcc

      # 重命名产物，加上平台后缀，避免文件名冲突
      - name: Rename binary
        shell: bash
        run: |
          cp target/${{ matrix.target }}/release/${{ matrix.binary }} \
             hello_world-${{ matrix.target }}${{ matrix.target == 'x86_64-pc-windows-msvc' && '.exe' || '' }}

      # Unix 打包为 tar.gz（保留执行权限），Windows 打包为 zip
      - name: Package (Unix)
        if: matrix.os != 'windows-latest'
        run: |
          tar -czf hello_world-${{ matrix.target }}.tar.gz \
            hello_world-${{ matrix.target }}

      - name: Package (Windows)
        if: matrix.os == 'windows-latest'
        shell: bash
        run: |
          7z a hello_world-${{ matrix.target }}.zip \
            hello_world-${{ matrix.target }}.exe

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: hello_world-${{ matrix.target }}
          path: |
            hello_world-${{ matrix.target }}.tar.gz
            hello_world-${{ matrix.target }}.zip

  release:
    name: Create Draft Release
    needs: build
    runs-on: ubuntu-latest

    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts
          merge-multiple: true

      - name: Create draft release
        uses: softprops/action-gh-release@v1
        with:
          draft: true
          name: ${{ github.ref_name }}
          files: artifacts/*
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
