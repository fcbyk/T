<!-- 伪元素是一个附加至选择器末的关键词，允许你对被选择元素的特定部分修改样式 -->

<h2>首行伪元素示例</h2>
<p class="first-line">这是第一段文字。伪元素 ::first-line 可以选择段落的第一行并应用特殊样式。
这段文字用于演示第一行和其他行的不同效果。继续添加更多文字以确保有多行显示。</p>

<h2>首字母伪元素示例</h2>
<p class="first-letter">这是第二段文字。伪元素 ::first-letter 可以选择段落的第一个字母并应用特殊样式，常用于实现首字下沉效果。</p>

<h2>前后伪元素示例</h2>
<span class="before-after">中间内容</span>

<h2>组合使用伪元素</h2>
<p class="combined">这是一个同时使用多个伪元素的段落。首字母会变大，第一行会有特殊颜色，前后还会添加装饰性内容。</p>

<style>
    p::first-line {
        /* 选择段落的第一行文本 */
        color: blue;
        font-weight: bold;
        font-size: 18px;
    }
    
    p.first-letter::first-letter {
        /* 选择段落的第一个字母/字符 */
        color: red;
        font-size: 36px;
        float: left;
        margin-right: 5px;
        line-height: 1;
    }
    
    span.before-after::before {
        /* 在元素内容之前插入内容 */
        content: "【前】";
        color: green;
        font-weight: bold;
    }
    
    span.before-after::after {
        /* 在元素内容之后插入内容 */
        content: "【后】";
        color: orange;
        font-weight: bold;
    }

    /* 组合使用多个伪元素 */
    p.combined::first-letter {
        color: purple;
        font-size: 32px;
        float: left;
        margin-right: 5px;
    }
    
    p.combined::first-line {
        color: teal;
        background-color: lightyellow;
    }
    
    p.combined::before {
        content: "★ ";
        color: gold;
    }
    
    p.combined::after {
        content: " ★";
        color: gold;
    }
</style>
