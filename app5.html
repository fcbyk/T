<div class="outline-demo">外边框演示</div>

<style>
  .outline-demo {
    width: 200px;
    height: 100px;
    border: 2px solid blue;
    margin: 20px;
    
    /* outline（外边框）不会占用空间，绘制在元素外部 */
    
    /* 单独设置outline颜色 */
    outline-color: wheat;
    
    /* 单独设置outline样式：点状线 */
    outline-style: dotted;
    
    /* 单独设置outline宽度 */
    outline-width: 2px;
    
    /* 简写形式：颜色 + 样式 + 宽度 */
    /* 等价于上面三行代码 */
    outline: green dotted thick;
  }
</style>
