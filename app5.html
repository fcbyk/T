
<table border="1">

    <!-- 表头标签，用于定义表格的头部内容 -->
    <thead>
        <tr>
            <th>Header 1</th>
            <th>Header 2</th>
            <th>Header 3</th>
        </tr>
    </thead>

    <!-- 表主体标签，用于定义表格的主要内容 -->
    <tbody>
        <tr>
            <td>Row 1, Cell 1</td>
            <td>Row 1, Cell 2</td>
            <td>Row 1, Cell 3</td>
        </tr>
        <tr>
            <td>Row 2, Cell 1</td>
            <td>Row 2, Cell 2</td>
            <td>Row 2, Cell 3</td>
        </tr>
    </tbody>

    <!-- 表尾标签，用于定义表格的底部内容 -->
    <tfoot>
        <tr>
            <td colspan="3">Footer Information</td>
        </tr>
    </tfoot>
</table>
