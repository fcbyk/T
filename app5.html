<div id="hello">
  <div id="id-example", class="class-example">CSS 层叠性示例</div>
</div>

<style>
/* 
权重计算=(内联, ID, 类/属性/伪类, 元素/伪元素)
原则上，选择器越详细，权重越高
*/
div { color: blue; }              /* 0001 */
.class-example { color: green; }  /* 0010 */
#id-example { color: red; }       /* 0100 */
#hello > div { color: rgb(255, 0, 162); }  /* 0101 */
#hello div { color: rgb(187, 0, 255); } /* 0101 */
/* 权重相同时，后面的生效 */
</style>
