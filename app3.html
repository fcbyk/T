<!-- https://cn.vuejs.org/guide/essentials/class-and-style.html -->
<!--
Class 与 Style 绑定
  数据绑定的一个常见需求场景是操纵元素的 CSS class 列表和内联样式
  Vue 专门为 class 和 style 的 v-bind 用法提供了特殊的功能增强
  除了字符串外，表达式的值也可以是对象或数组
-->
<div id="app">
    <!-- 
    绑定对象
    传递一个对象来动态切换 class
      -->
    <div :class="{ active: isActive }">元素1</div>

    <!-- 
    对象中写多个字段来操作多个 class
    :class 指令也可以和一般的 class attribute 共存
      -->
    <div
        class="static"
        :class="{ active: isActive, 'text-danger': hasError }"
    >元素2</div>

    <!-- 绑定的对象并不一定需要写成内联字面量的形式，也可以直接绑定一个对象 -->
    <div :class="classObject">元素3</div>

    <!-- 
    绑定数组
    我们可以给 :class 绑定一个数组来渲染多个 CSS class
      -->
    <div :class="[activeClass, errorClass]">元素4</div>

    <!-- 
    绑定内联样式
    :style 支持绑定 JavaScript 对象值
    -->
    <div :style="{ color: activeColor, fontSize: fontSize + 'px' }">元素5</div>

    <!-- :style 指令也可以和常规的 style attribute 共存，就像 :class 一样 -->
     <h1 style="color: red" :style="'font-size: 1em'">hello</h1>
</div>

<script type="module">
  import { createApp, ref } from "https://unpkg.com/vue@3/dist/vue.esm-browser.js";

  /**
   * 选项式 API 的 data() 函数
   * data() 函数返回一个对象，对象的属性默认就是响应式数据
   */
  createApp({
    data:() =>({
        // 内联字面量对象
        isActive: true,
        hasError: false,

        // 绑定对象
        classObject: {
            active: true,
            'text-danger': false
        },

        // 绑定数组
        activeClass: 'active',
        errorClass: 'text-danger',

        // 绑定内联样式值
        activeColor: 'red',
        fontSize: 30
    })
    }).mount("#app");
</script>
