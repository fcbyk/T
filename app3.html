<!-- 
一个组件需要显式声明它所接受的 props
这样 Vue 才能知道外部传入的哪些是 props，哪些是透传 attribute
https://cn.vuejs.org/guide/components/props
-->
<div id="app">
  <!-- 向子组件传递 props 数据 -->
  <component-a title="Hello" num="10" />
  <!-- 
   根据 HTML 规范，
   自定义元素标签名通常会自动转成小写
   浏览器环境使用 kebab-case 组件名
   -->
</div>

<script type="module">
  import {
    createApp,
    ref,
  } from "https://unpkg.com/vue@3/dist/vue.esm-browser.js";

  let ComponentA = {
    /**
     * 如果把组件理解成函数，那么 props 就是函数的参数
     * 组件需要显式声明它所接受的 props
     * 数组写法：props: ['title', 'num'],
     * 对象写法：props: { title: String, num: Number }
     */
    props: {
      title: String,
      num: Number
    },
    template: `
      <div>{{ title }}</div>
      <div>{{ num+10 }}</div>
    `,
  }

  createApp({
    setup: () => ({}),
    components: { ComponentA },
  }).mount("#app")
</script>
