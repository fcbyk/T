<div id="var-demo">
  <h2>CSS 变量示例</h2>
  <p>这段文字使用 CSS 变量定义的颜色和字体大小</p>
  <button class="btn-primary">按钮</button>
</div>

<style>
/* CSS 变量：必须以--开头 */
:root {
  --main-color: #3498db;      /* 主色调 */
  --font-size: 30px;          /* 字体大小 */
  --padding: 30px;            /* 内边距 */
  --border-radius: 30px;       /* 圆角 */
}

/* 使用变量 */
#var-demo {
  background-color: var(--main-color);
  font-size: var(--font-size);
  padding: var(--padding);
  border-radius: var(--border-radius);
  
  /* 可以有备选值，如果变量未定义则使用备选值 */
  color: var(--text-color, white);  
}

.btn-primary {
  background-color: black;
  color: white;
  padding: var(--padding);
  border: none;
  border-radius: var(--border-radius);
}
</style>
