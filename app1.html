<!-- https://cn.vuejs.org/guide/essentials/template-syntax.html -->
<!-- 
插值语法
  使用双大括号 {{ }} 进行文本插值
  最基本的数据绑定形式
-->
<div id="app">
  <!-- 文本插值 -->
  <div>{{ message }}</div>

  <!-- 文本支持使用表达式 -->
  <div>{{ A>B?A:B }}</div>
  <div>{{ 1+1 }}</div>
  <div>{{ number + 1 }}</div>
  <div>{{ ok ? 'YES' : 'NO' }}</div>
  <div>{{ message.split('').reverse().join('') }}</div>
</div>

<script type="module">
  import { createApp } from "https://unpkg.com/vue@3/dist/vue.esm-browser.js";

  createApp({
    setup: () => ({
      message: "文本插值",
      A: 1,
      B: 2,
      ok: true,
      number: 100,
    }),
  }).mount("#app");
</script>
