<!-- https://cn.vuejs.org/guide/components/slots -->
<!-- 
插槽（Slots）
我们已经了解到组件能够接收任意类型的 JavaScript 值作为 props，
但组件要如何接收模板内容呢？
在某些场景中，我们可能想要为子组件传递一些模板片段,
让子组件在它们的组件中渲染这些片段。 
-->
<div id="app">
  <!-- 插槽内容 -->
  <Layout>
    <!-- 注意这里是传给指令的arg，而不是value -->
    <template v-slot:header>
      <h1>Here might be a page title</h1>
    </template>

    <!-- 默认插槽显示写法 -->
    <template #default>
      <p>A paragraph for the main content.</p>
      <p>And another one.</p>
    </template>

    <!-- v-slot简写 -->
    <template #footer>
      <p>Here's some contact info</p>
    </template>
  </Layout>

  <Layout>
    <!-- header无内容，会渲染一个空元素 -->

    <!-- 隐式的默认插槽 -->
    <p>A paragraph for the main content.</p>
    <p>And another one.</p>

    <!-- footer插槽无内容覆盖，会显示默认内容 -->
  </Layout>
</div>

<script type="module">
  import {
    createApp,
    ref,
  } from "https://unpkg.com/vue@3/dist/vue.esm-browser.js";

  // 定义组件
  let Layout = {
    /**
     * <slot> 元素是一个插槽出口 (slot outlet)
     * 标示了父元素提供的插槽内容 (slot content) 将在哪里被渲染
     */
    template: `
    <div class="layout-container">
      <header class="layout-header">
        <!-- 具名插槽 -->
        <slot name="header"></slot>
      </header>

      <main class="layout-main">
        <!-- 默认插槽 -->
        <slot></slot>
      </main>

      <footer class="layout-footer">
        <!-- 带默认内容的插槽 -->
        <slot name="footer">
          <p>footer默认内容</p>
        </slot>
      </footer>
    </div>
  `
  }

  // 创建应用实例
  createApp({
    // 补充：如果根实例写了 template（会覆盖页面原有内容）
    components: { Layout },
  }).mount("#app")
</script>


<style>

  display: flex;
  flex-direction: column;
  background: white;
  border-radius: 12px;
  box-shadow: 0 10px 40px rgba(0, 0, 0, 0.1);
  overflow: hidden;
}

.layout-header {
  background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);

  padding: 24px 32px;
}

.layout-header h1 {
  font-size: 24px;

  flex: 1;

  background: #fafafa;
}

.layout-main p {
  color: #555;

  margin-bottom: 12px;
  font-size: 16px;
}

.layout-footer {
  background: #f8f9fa;
  color: #666;
  text-align: center;
  padding: 20px 32px;
  border-top: 1px solid #e9ecef;
}

.layout-footer p {
  font-size: 14px;
}
</style>
