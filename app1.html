<!-- // https://cn.vuejs.org/guide/reusability/plugins.html -->
<div id="app">
  <my-component></my-component>
  <p v-color="'red'">apple (使用插件提供的指令)</p>
  <p>{{ hello }}</p>
</div>

<script type="module">
  import {
    createApp,
    inject,
  } from "https://unpkg.com/vue@3/dist/vue.esm-browser.js";

  const myPlugin = {
    install(app, options) {
      // 添加全局属性
      app.config.globalProperties.hello = "插件添加的全局属性(data3)";

      // 注册组件
      app.component("MyComponent", {
        setup() {
          const helloFromProvide = inject("hello");
          return { 
            msg: "插件注册的全局组件(data1)", 
            helloFromProvide 
          }
        },
        template: `
          <div>
            <h1>{{ msg }}</h1>
            <p>{{ helloFromProvide }}</p>
          </div>
        `,
      })

      // 注册自定义指令
      app.directive("color", (el, binding) => {
        el.style.color = binding.value;
      })

      // 使用 provide 提供一个全局的 'hello' 值
      app.provide("hello", "插件注入的值(data2)");
    },
  };

  let app = createApp()
  app.use(myPlugin)
  app.mount("#app")
</script>
