<!-- 标题标签 -->
<!-- 浏览器开发者工具，查看用户代理样式表，即可查看标签自带的样式 -->
<h1>标题1</h1>
<h2>标题2</h2>
<h3>标题3</h3>
<h4>标题4</h4>
<h5>标题5</h5>
<h6>标题6</h6>

<!-- h7标签的用户代理样式表为空，属于自定义表 -->
<h7>不存在标题7</h7>

<style>
    /* 把标题7设置为和标题1一样的样式 */
    h7 {
        display: block;
        font-size: 2em;
        margin-block-start: 0.67em;
        margin-block-end: 0.67em;
        margin-inline-start: 0px;
        margin-inline-end: 0px;
        font-weight: bold;
    }
</style>
