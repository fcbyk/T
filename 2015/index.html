<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>js模块化</title>
</head>
<body>
    <!--  ES6模块（2015年） -->
    <!-- 使用 type="module" 的 <script> 标签可以启用模块化语法（import 和 export），并使脚本具有独立作用域、异步加载、严格模式等特性。-->
    <script type="module">
          import React from 'https://cdn.jsdelivr.net/npm/react@17/umd/react.production.min.js';
          console.log(React);
    </script>
</body>
</html>
