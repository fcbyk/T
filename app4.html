<h2 id="demo1">CSS 层叠性示例</h2>
<div id="important-demo">这条文字是蓝色（!important）</div>

<style>
/* CSS 层叠性：相同权重下，后定义会覆盖先定义的样式 */
#demo1 { color: blue; }        /* 先定义 */
#demo1 { color: green; }       /* 后定义，覆盖前面的 */

/* !important 设置权重最高 */
#important-demo { 
  color: blue !important;  /* 这条规则会覆盖其他任何color规则 */
}
#important-demo { 
  color: green;            /* 这个规则会被忽略 */
}
</style>
