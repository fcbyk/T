<!-- https://cn.vuejs.org/guide/essentials/event-handling.html -->
<!-- 
事件处理
  我们可以使用 v-on 指令 (简写为 @) 来监听 DOM 事件
  并在事件触发时执行对应的 JavaScript
-->

<div id="app">
  <button @click="count++">你点击了我 {{ count }} 次</button>
</div>

<script type="module">
    import { createApp, ref } from "https://unpkg.com/vue@3/dist/vue.esm-browser.js";
    createApp({
        setup: () => ({
            count: ref(0)
        })
    }).mount("#app");
</script>
