<!-- CSS 伪类是添加到选择器的关键字，作用是选择具有特殊状态的元素 -->

<h2>链接伪类示例</h2>
<a href="https://example.com">未访问链接（:link）</a>
<a href="https://google.com">已访问链接（:visited）</a>

<h2>表单伪类示例</h2>
<form>
    <input type="text" placeholder="文本输入框（:focus/:hover/:active）"><br><br>
    
    <input type="checkbox" id="check1">
    <label for="check1">复选框选中状态（:checked + label）</label><br><br>
    
    <input type="email" placeholder="邮箱验证（:valid/:invalid）" required>
</form>

<h2>结构伪类示例</h2>
<div class="container">
    <span>第一个子元素（:first-child）</span>
    <span>第二个子元素（:nth-child(2)）</span>
    <span>第三个子元素</span>
</div>

<h2>目标伪类示例</h2>
<a href="#section1">点击跳转到目标区域</a>
<div id="section1">
    这是目标区域（:target）
</div>

<h2>其他伪类示例</h2>
<div class="root-example">根元素下的内容（:root）</div>
<div class="empty-example"></div>
<p class="empty-example">空元素示例（:empty - 上面那个div是空的）</p>

<style>
    /* 链接伪类 - 按LVHA顺序定义 */
    a:link {
        /* 未访问的链接 */
        color: blue;
        text-decoration: underline;
    }
    
    a:visited {
        /* 已访问的链接 */
        color: purple;
    }
    
    a:hover {
        /* 鼠标悬停时的链接 */
        color: red;
        background-color: lightyellow;
    }
    
    a:active {
        /* 鼠标点击时的链接 */
        color: orange;
    }

    /* 表单伪类 */
    input:focus {
        /* 获得焦点时的输入框 */
        outline: 2px solid blue;
        background-color: lightblue;
    }
    
    input:hover {
        /* 鼠标悬停时的输入框 */
        background-color: lightgray;
    }
    
    input:active {
        /* 鼠标按下时的输入框 */
        border-color: red;
    }
    
    input:checked + label {
        /* 复选框选中后，相邻的label元素 */
        color: green;
        font-weight: bold;
    }
    
    input:valid {
        /* 验证通过的输入框 */
        border: 2px solid green;
    }

    /* 结构伪类 */
    div:target {
        /* 被锚点定位的目标元素 */
        background-color: yellow;
        padding: 10px;
        border: 2px solid orange;
    }
    
    .container span:first-child {
        /* 父元素的第一个子元素 */
        color: red;
        font-weight: bold;
    }
    
    .container span:nth-child(2) {
        /* 父元素的第二个子元素 */
        color: blue;
        font-style: italic;
    }

    /* 其他伪类 */
    :root {
        /* 文档的根元素（html） */
        --main-color: blue;
    }
    
    .root-example {
        color: var(--main-color);
    }
    
    :empty {
        /* 没有子元素的空元素 */
        width: 100px;
        height: 50px;
        background-color: lightcoral;
        border: 2px dashed red;
    }
</style>
