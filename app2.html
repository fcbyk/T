<!-- https://cn.vuejs.org/api/application.html#app-mixin -->
<!-- 
混入（mixin）就是「组件代码片段打包」
可以将多个组件的公共部分提取出来，然后在需要的地方引入
-->
<!-- 
不是vue3的最佳实践(仅向后兼容vue2)
vue3推荐用组合式函数来替代mixin
-->
<div id="app">
  <test-comp />
</div>

<script type="module">
  import {
    createApp,
    inject,
  } from "https://unpkg.com/vue@3/dist/vue.esm-browser.js";

  // 公共混入对象
  const myMixin = {
    data() {
      return {
        name: "我是混入里的数据"
      }
    },
    methods: {
      sayHi() {
        console.log("混入里的方法 sayHi")
      }
    },
    created() {
      console.log("混入的created生命周期");
    }
  }

  let TestComp = {
    // 把公共逻辑混入当前组件
    mixins: [myMixin],

    // 组件自己的东西
    template: `
    <div>{{ name }}</div>
    <button @click="sayHi">点击</button>
    `,
    created() {
      console.log("组件自己的created");
    }
  }

  let app = createApp({
    components: { TestComp }
  })

  // 全局混入，页面每一个组件、根实例都会带上这个逻辑
  // 慎用！容易造成全局污染、性能冗余
  app.mixin({
    created() {
      console.log("全局混入的created生命周期");
    }
  })

  app.mount("#app")
</script>
