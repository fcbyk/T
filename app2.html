<!-- https://cn.vuejs.org/guide/essentials/template-syntax.html -->
<!--
属性绑定
  将数据绑定到 HTML 属性
  双大括号不能在 HTML attributes 中使用
  想要响应式地绑定一个 attribute,需要使用 v-bind 指令
-->
<div id="app">
  <!-- 基本用法: 绑定 id 属性 -->
  <div v-bind:id="dynamicId">动态 ID</div>

  <!-- 简写语法1: : 代替 v-bind: -->
  <div :class="dynamicClass">动态 Class</div>

  <!-- 
  简写语法2 
  等价于 :hello="hello"
  -->
  <div :hello>简写语法2</div>

  <!-- 绑定多个属性 -->
  <img :src="imageUrl" :alt="imageAlt" :width="imageWidth" />

  <!-- 绑定布尔属性 -->
  <button :disabled="isDisabled">禁用按钮</button>
</div>

<script type="module">
  import { createApp } from "https://unpkg.com/vue@3/dist/vue.esm-browser.js";

  createApp({
    setup: () => ({
      // 动态 ID
      dynamicId: "my-element",

      // 动态 Class
      dynamicClass: "container",

      // 图片相关
      imageUrl: "https://vuejs.org/images/logo.png",
      imageAlt: "Vue Logo",
      imageWidth: 100,

      // 布尔属性
      isDisabled: true,

      hello: "foo",
    }),
  }).mount("#app");
</script>
