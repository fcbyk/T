<p>TEXT STYLE</p>

<style>
/* 段落样式：给所有 <p> 标签设置文本排版效果 */
p{
    /* 行高：当前字体大小的2倍，让文字上下更宽松 */
    line-height: 2em;

    /* 单词间距：英文单词之间的距离为2em */
    word-spacing: 2em;

    /* 字间距：每个文字/字母之间的空隙为1rem */
    letter-spacing: 1rem;

    /* 首行缩进：段落第一行开头空2rem距离 */
    text-indent: 2rem;

    /* 强制不换行：文字无论多长都不自动换行，一直横向排列 */
    white-space: nowrap;

    /* 长单词换行：单词过长时自动断开换行（但被上面nowrap覆盖，不生效） */
    overflow-wrap: break-word;

    /* 文字超出显示省略号...（必须配合overflow:hidden才生效，当前无效） */
    text-overflow: ellipsis;

    /* 水平对齐：文字在容器内水平居中 */
    text-align: center;

    /* 垂直对齐：对<p>块级元素无效，只对图片/行内元素生效 */
    vertical-align: middle;

    /* 文字竖排：垂直排版，从右向左书写（像古书一样） */
    writing-mode: vertical-rl;
}
</style>
