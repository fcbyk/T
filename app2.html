<div class="box1">
  <div class="box2">盒子模型</div>
</div>


<style>
  .box1{
    border: 1px solid rgb(3, 3, 3);
  }
  .box2 {
    width: 200px;  /* 宽度 */
    height: 200px;  /* 高度 */
    border: 1px solid rgb(3, 3, 3);  /* 边框 */
  }

  .box2 {
    /* 单独设置外边距 */
    margin-top: 10px;
    margin-bottom: 10px;
    margin-right: 50px;
    margin-left: 30px;
    
    /* 简写形式设置外边距 */

    /* 1个参数：上下左右 全部 10px */
    margin: 10px;

    /* 4个参数：上 → 右 → 下 → 左 （顺时针！）*/
    margin: 10px 20px 30px 40px;

    /* 2个参数：上下 → 左右 */
    margin: 10px 20px;

    /* 3个参数：上 → 左右 → 下 */
    margin: 10px 20px 30px; 
  }

  .box2 {
    padding-top:25px;
    padding-bottom:25px;
    padding-right:50px;
    padding-left:50px;

    /* 
    1 个：全都一样
    2 个：上下、左右
    3 个：上、左右、下
    4 个：上、右、下、左（顺时针） 
    */
    padding:10px 5px 15px 20px;
  }

  .box2 {
    border-bottom-left-radius: 4px;
    border-bottom-right-radius: 4px;
    border-top-left-radius: 4px;

    border-radius: 4px;   /* 左上、右上、右下、左下 均为4px */
    border-radius: 6px 10px;  /* 左上=6px，右下=6px；右上=10px，左下=10px */

    border-radius: 1px 3px 5px 7px; /* 左上1 | 右上3 | 右下5 | 左下7 */

</style>
